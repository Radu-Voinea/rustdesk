# Build downloadable Windows + Linux (x64) Flutter artifacts of this fork.
#
# Self-contained: sets up Rust, Flutter, vcpkg (software codecs only — no ffmpeg
# / hwcodec, so the build is fast), generates the FFI bridge, builds the Rust
# library and the Flutter desktop app, and uploads the result as a workflow
# artifact you can download from the run's "Summary" page.
#
# Trigger it from the Actions tab ("Run workflow"), or it runs automatically on
# push to master.
name: Build artifacts (Windows + Linux)

on:
  workflow_dispatch:
  push:
    branches: [master]

env:
  FLUTTER_VERSION: "3.24.5"
  LLVM_VERSION: "15.0.6" # newer libclang mis-generates the aom bindings (opaque structs)
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  FRB_VERSION: "1.80.1"
  CARGO_EXPAND_VERSION: "1.0.95"

jobs:
  # --------------------------------------------------------------------------
  linux:
    name: Linux x64 (flutter)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          # Resolve libunwind-dev in its own transaction first. On the ubuntu-22.04
          # runner image the combined install otherwise fails to pull it in as a
          # libgstreamer1.0-dev dependency ("held broken packages").
          sudo apt-get install -y libunwind-dev
          # libdbus-1-dev is required by scrap's `wayland` feature (the `dbus` crate).
          sudo apt-get install -y \
            zip unzip g++ gcc git curl wget nasm yasm make cmake ninja-build \
            pkg-config clang libclang-dev libgtk-3-dev libxcb-randr0-dev \
            libxdo-dev libxfixes-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libasound2-dev libpulse-dev liblzma-dev libssl-dev libdbus-1-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libpam0g-dev \
            libwayland-dev libwayland-bin wayland-protocols libxkbcommon-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: rustup toolchain install nightly --profile minimal # cargo-expand needs nightly
      - uses: Swatinem/rust-cache@v2

      - name: Setup vcpkg + build codecs (libvpx, libyuv, opus, aom)
        run: |
          set -e
          git clone https://github.com/microsoft/vcpkg
          git -C vcpkg checkout "$VCPKG_COMMIT_ID"
          ./vcpkg/bootstrap-vcpkg.sh -disableMetrics
          # Force classic mode: the repo root has a vcpkg.json, which vcpkg would
          # otherwise auto-detect (manifest mode rejects per-package args). The Rust
          # build (scrap/build.rs) expects classic layout: $VCPKG_ROOT/installed/x64-linux.
          ( cd vcpkg && ./vcpkg install --classic --triplet x64-linux libvpx libyuv opus aom )
          echo "VCPKG_ROOT=$PWD/vcpkg" >> "$GITHUB_ENV"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - run: flutter config --enable-linux-desktop

      - name: Generate FFI bridge
        run: |
          # No --locked: these tools' 2023-era lockfiles don't reliably build on
          # current stable rustc; let cargo resolve compatible dependency versions.
          cargo install cargo-expand --version "$CARGO_EXPAND_VERSION"
          cargo install flutter_rust_bridge_codegen --version "$FRB_VERSION" --features uuid
          ( cd flutter && flutter pub get )
          flutter_rust_bridge_codegen \
            --rust-input ./src/flutter_ffi.rs \
            --dart-output ./flutter/lib/generated_bridge.dart \
            --c-output ./flutter/macos/Runner/bridge_generated.h

      - name: Build Rust library
        run: cargo build --features flutter --lib --release

      - name: Build Flutter Linux bundle
        run: ( cd flutter && flutter build linux --release )

      - name: Package
        run: tar czf rustdesk-linux-x64.tar.gz -C flutter/build/linux/x64/release/bundle .

      - uses: actions/upload-artifact@v4
        with:
          name: rustdesk-linux-x64
          path: rustdesk-linux-x64.tar.gz

  # --------------------------------------------------------------------------
  windows:
    name: Windows x64 (flutter)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Enable Developer Mode (symlink support for flutter pub get)
        shell: pwsh
        run: |
          New-Item -Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\AppModelUnlock" -Force | Out-Null
          New-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\AppModelUnlock" -Name AllowDevelopmentWithoutDevLicense -Value 1 -PropertyType DWord -Force | Out-Null

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          components: rustfmt
      - run: rustup toolchain install nightly --profile minimal
      - uses: Swatinem/rust-cache@v2

      - name: Install LLVM ${{ env.LLVM_VERSION }} (libclang for bindgen)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: ${{ env.LLVM_VERSION }}
      - name: Set LIBCLANG_PATH
        shell: pwsh
        run: echo "LIBCLANG_PATH=$env:LLVM_PATH\bin" >> $env:GITHUB_ENV

      - name: Setup vcpkg + build codecs (libvpx, libyuv, opus, aom)
        shell: bash
        run: |
          set -e
          git clone https://github.com/microsoft/vcpkg
          git -C vcpkg checkout "$VCPKG_COMMIT_ID"
          ./vcpkg/bootstrap-vcpkg.bat -disableMetrics
          # Force classic mode (repo root has a vcpkg.json that would trigger manifest
          # mode). scrap/build.rs expects $VCPKG_ROOT/installed/x64-windows-static.
          ( cd vcpkg && ./vcpkg.exe install --classic --triplet x64-windows-static libvpx libyuv opus aom )
          echo "VCPKG_ROOT=$(pwd)/vcpkg" >> "$GITHUB_ENV"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - run: flutter config --enable-windows-desktop

      - name: Generate FFI bridge
        shell: bash
        run: |
          # No --locked: these tools' 2023-era lockfiles don't reliably build on
          # current stable rustc; let cargo resolve compatible dependency versions.
          cargo install cargo-expand --version "$CARGO_EXPAND_VERSION"
          cargo install flutter_rust_bridge_codegen --version "$FRB_VERSION" --features uuid
          ( cd flutter && flutter pub get )
          flutter_rust_bridge_codegen \
            --rust-input ./src/flutter_ffi.rs \
            --dart-output ./flutter/lib/generated_bridge.dart \
            --c-output ./flutter/macos/Runner/bridge_generated.h

      - name: Build Rust library
        run: cargo build --features flutter --lib --release

      - name: Build Flutter Windows bundle
        shell: bash
        run: ( cd flutter && flutter build windows --release )

      - uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows-x64
          path: flutter/build/windows/x64/runner/Release
